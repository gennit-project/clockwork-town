# -----------------------------
# Scalars
# -----------------------------
scalar Date
scalar DateTime

# -----------------------------
# Enums
# -----------------------------
enum LotType { RESIDENTIAL COMMUNITY GENERIC }
enum RelationshipDepth { ACQUAINTANCE FRIEND CLOSE_FRIEND BEST_FRIEND LOVER SPOUSE }
enum SelfActualizationType { CREATIVITY KNOWLEDGE NATURE POPULARITY PROFESSION SPIRITUALITY }

# -----------------------------
# Core World Structure
# -----------------------------
type World {
  id: ID!
  name: String!
  createdAt: DateTime!
  regions: [Region!]!
}

type Region {
  id: ID!
  name: String!
  worldId: ID!
  kind: String!              # e.g., "urban", "rural", "mountain", etc.
  lots: [Lot!]!
  naturalAreas: [NaturalArea!]!
  characters: [Character!]!  # derived via AT edges through lots/spaces
  animals: [Animal!]!        # derived via ANIMAL_AT edges through lots
}

type NaturalArea {
  id: ID!
  name: String!
  description: String!
}

type Lot {
  id: ID!
  name: String!
  lotType: LotType!
  items: [Item!]!
  indoorRooms: [Space!]!
  outdoorAreas: [Space!]!
  household: Household       # current household occupying the lot (if any)
}

type LotTemplate {
  id: ID!
  name: String!
  lotType: LotType!
  description: String
  tags: [String!]!
  indoorRooms: [SpaceTemplate!]!
  outdoorAreas: [SpaceTemplate!]!
}

type SpaceTemplate {
  name: String!
  description: String!
  items: [ItemTemplate!]!
}

type ItemTemplate {
  name: String!
  description: String!
  count: Int!
}

type HouseholdTemplate {
  id: ID!
  name: String!
  description: String
  tags: [String!]!
  characters: [CharacterTemplate!]!
  animals: [AnimalTemplate!]!
}

type CharacterTemplate {
  name: String!
  age: Int!
  bio: String
}

type AnimalTemplate {
  name: String!
  age: Int!
  traits: [String!]!
}

type Space {
  id: ID!
  name: String!
  description: String!
  isIndoor: Boolean!
  items: [Item!]!
  characters: [Character!]!
}

type Household {
  id: ID!
  name: String!
  characters: [Character!]!
  animals: [Animal!]!
  currentLot: Lot
  lotId: ID
  lotName: String
}

# -----------------------------
# Items & Memories
# -----------------------------
type Item {
  id: ID!
  name: String!
  description: String!
  canBeUsedByHumans: Boolean!
  canBeUsedByAnimals: Boolean!
  minimumAgeToUse: Int
  maxSimultaneousUsers: Int
  satisfiesNeeds: [String!]!
  canStoreItems: Boolean!
  allowedActivities: [String!]!
  storedItems: [Item!]!      # items contained within this item (bags/chests/fridges/etc.)
  cost: Int!
  count: Int!

  # Derived via USING edges (query-only, not stored as arrays):
  activeUsers: [Character!]!
  activeAnimalUsers: [Animal!]!
}

type Memory {
  id: ID!
  content: String!
  createdAt: DateTime!
}

# -----------------------------
# Needs / Values / Traits
# -----------------------------
# Simple, extensible "key/value" needs model to avoid schema churn.
type Need {
  key: String!         # e.g., "hunger", "energy", "hygiene"
  value: Int!          # current level (0-100 or your chosen scale)
  decayPerHour: Int!   # how fast it drops per in-game hour
}

type SelfActualizationNeed {
  type: SelfActualizationType!
  progress: Int!
  goal: Int!
}

type Value {
  id: ID!
  name: String!        # e.g., "Family", "Creativity", "Outdoors"
  description: String
}

type Trait {
  id: ID!
  name: String!
  description: String!
  # Modifiers represented as lists of needs for flexibility (e.g., {key:"hunger", value:+5, decayPerHour:-1})
  basicNeedModifiers: [Need!]!
  emotionalNeedModifiers: [Need!]!
}

# -----------------------------
# Relationships (Character <-> Character)
# -----------------------------
union RelationshipEntity = Character | Animal

type Relationship {
  id: ID!
  from: RelationshipEntity!
  to: RelationshipEntity!
  relationshipType: String!        # e.g., "friendship", "romance", "rivalry"
  longTermCloseness: Int!
  shortTermCloseness: Int!
  memories: [Memory!]!
}

# -----------------------------
# Activities (now) & Activity Types (templates)
# -----------------------------
type ActivityType {
  id: ID!
  name: String!
  description: String!
  defaultDurationMinutes: Int!
}

type Activity {
  id: ID!
  activityType: ActivityType!
  startedAt: DateTime!
  status: String!        # e.g., "active", "paused", "stopped"
  location: Lot!
  note: String
}

# -----------------------------
# Employment
# -----------------------------
type Employer {
  id: ID!
  companyName: String!
  industry: String!
  locations: [Lot!]!
}

type Shift {
  day: String!     # e.g., "Mon", "Tue", or "Monday" (your choice)
  start: String!   # "09:00"
  end: String!     # "17:00"
  location: Lot!
}

type Employment {
  id: ID!
  employer: Employer!
  position: String!
  salary: Int!
  schedule: [Shift!]!
}

# -----------------------------
# Characters (humans) & Animals
# -----------------------------
type Character {
  id: ID!
  name: String!
  age: Int!
  bio: String
  traits: [Trait!]!
  values: [Value!]!

  # Family (can be derived from PARENT_OF edges; exposed directly for convenience)
  biologicalParents: [Character!]!
  adoptiveParents: [Character!]!
  stepParents: [Character!]!
  siblings: [Character!]!
  biologicalChildren: [Character!]!
  adoptiveChildren: [Character!]!
  stepChildren: [Character!]!

  # Pets (ownership edges)
  pets: [Animal!]!

  # Current state
  currentHousehold: Household!
  location: Lot!
  homeLot: Lot!

  # Inventory & memories
  inventory: [Item!]!
  longTermMemories: [Memory!]!
  shortTermMemories: [Memory!]!

  # Needs
  basicNeeds: [Need!]!
  emotionalNeeds: [Need!]!
  selfActualizationNeeds: [SelfActualizationNeed!]!

  # Social knowledge
  knownCharacters: [Relationship!]!
  knownAnimals: [Relationship!]!

  # Routine & job
  weeklySchedule: [Activity!]!
  employment: Employment
}

type Animal {
  id: ID!
  name: String!
  age: Int!
  traits: [String!]!
  bio: String

  ownerId: ID!
  owner: Character!
  parents: [Animal!]!
  siblings: [Animal!]!
  children: [Animal!]!

  currentHousehold: Household!
  currentLot: Lot!
  homeLot: Lot!

  knownCharacters: [Character!]!
  knownAnimals: [Animal!]!
}

# -----------------------------
# Presence summary (for region overviews)
# -----------------------------
type Presence {
  who: String!     # character name
  where: String!   # lot/space name
  doing: String
  status: String
}

# -----------------------------
# Pagination (connection pattern)
# -----------------------------
input Page {
  after: String
  limit: Int = 50
}

type CharacterEdge { cursor: String!, node: Character! }
type CharacterConnection { edges: [CharacterEdge!]!, hasNextPage: Boolean! }

# -----------------------------
# Queries
# -----------------------------
type Query {
  worlds: [World!]!
  world(id: ID!): World
  regions(worldId: ID!): [Region!]!
  region(id: ID!): Region
  lots(regionId: ID!): [Lot!]!
  lot(id: ID!): Lot
  space(id: ID!): Space
  households(regionId: ID!): [Household!]!
  household(id: ID!): Household

  character(id: ID!): Character
  characters(page: Page): CharacterConnection!
  charactersInLot(lotId: ID!): [Character!]!

  # "Who is where & doing what" for a region
  whereIsEveryone(regionId: ID!): [Presence!]!

  # Template library
  lotTemplates(tags: [String!]): [LotTemplate!]!
  lotTemplate(id: ID!): LotTemplate
  householdTemplates(tags: [String!]): [HouseholdTemplate!]!
  householdTemplate(id: ID!): HouseholdTemplate
}

# -----------------------------
# Inputs
# -----------------------------
input NewWorld {
  id: ID!
  name: String!
}

input NewRegion {
  id: ID!
  worldId: ID!
  name: String!
  kind: String!
}

input NewLot {
  id: ID!
  regionId: ID!
  name: String!
  lotType: LotType!
}

input NewSpace {
  id: ID!
  lotId: ID!
  name: String!
  description: String!
  isIndoor: Boolean!
}

input NewHousehold {
  id: ID!
  name: String!
  regionId: ID!
  lotId: ID!
}

input NewCharacterSimple {
  id: ID!
  name: String!
  age: Int!
  bio: String
}

input NewAnimalSimple {
  id: ID!
  name: String!
  age: Int!
  traits: [String!]!
  ownerId: ID!
  bio: String
}

input NewCharacter {
  id: ID!
  name: String!
  age: Int!
  bio: String
  traitIds: [ID!]!        # pass Trait IDs; resolver attaches Trait nodes
  valueIds: [ID!]!        # pass Value IDs; resolver attaches Value nodes
  homeLotId: ID!
  householdId: ID!
}

input MoveInput {
  characterId: ID!
  lotId: ID!
}

input PerformInput {
  characterId: ID!
  activityTypeId: ID!
  note: String
}

input NewItem {
  id: ID!
  spaceId: ID!
  name: String!
  description: String!
}

input ItemInput {
  itemName: String!
  itemDescription: String!
  itemCount: Int!
}

input SpaceWithItemsInput {
  spaceName: String!
  spaceDescription: String!
  items: [ItemInput!]
}

input CreateLotWithSpacesInput {
  lotName: String!
  lotType: LotType!
  lotDescription: String
  indoorRooms: [SpaceWithItemsInput!]
  outdoorSpaces: [SpaceWithItemsInput!]
}

input CharacterTemplateInput {
  characterName: String!
  characterAge: Int!
  characterBio: String
}

input AnimalTemplateInput {
  animalName: String!
  animalAge: Int!
  animalTraits: [String!]!
}

input CreateHouseholdTemplateInput {
  householdName: String!
  householdDescription: String
  characters: [CharacterTemplateInput!]!
  animals: [AnimalTemplateInput!]
}

# -----------------------------
# Mutations
# -----------------------------
type Mutation {
  createWorld(input: NewWorld!): World!
  updateWorld(id: ID!, name: String!): World!
  deleteWorld(id: ID!): Boolean!

  createRegion(input: NewRegion!): Region!
  updateRegion(id: ID!, name: String!, kind: String!): Region!
  deleteRegion(id: ID!): Boolean!

  createLot(input: NewLot!): Lot!
  createLotWithSpacesAndItems(regionId: ID!, input: CreateLotWithSpacesInput!): Lot!
  updateLot(id: ID!, name: String!, lotType: LotType!): Lot!
  deleteLot(id: ID!): Boolean!

  createSpace(input: NewSpace!): Space!
  updateSpace(id: ID!, name: String!, description: String!): Space!
  deleteSpace(id: ID!): Boolean!

  createItem(input: NewItem!): Item!
  createManyItems(spaceId: ID!, items: [ItemInput!]!): [Item!]!
  deleteItem(id: ID!): Boolean!

  createHousehold(input: NewHousehold!, characters: [NewCharacterSimple!]!, animals: [NewAnimalSimple!]): Household!
  updateHousehold(id: ID!, name: String!, lotId: ID!, characters: [NewCharacterSimple!], animals: [NewAnimalSimple!]): Household!
  deleteHousehold(id: ID!): Boolean!

  createCharacter(input: NewCharacter!): Character!
  moveCharacter(input: MoveInput!): Boolean!
  startActivity(input: PerformInput!): Boolean!
  stopAllActivities(characterId: ID!): Boolean!

  # Template library
  createLotTemplate(input: CreateLotWithSpacesInput!, tags: [String!]!): LotTemplate!
  deleteLotTemplate(id: ID!): Boolean!
  createHouseholdTemplate(input: CreateHouseholdTemplateInput!, tags: [String!]!): HouseholdTemplate!
  updateHouseholdTemplate(id: ID!, input: CreateHouseholdTemplateInput!, tags: [String!]!): HouseholdTemplate!
  deleteHouseholdTemplate(id: ID!): Boolean!

  # Optional if you wire Google Drive:
  backupNow: Boolean!
  restoreLatest: Boolean!
}
